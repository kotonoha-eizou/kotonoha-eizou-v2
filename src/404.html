<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ページが見つかりません | ひととき映像</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
body {
  margin: 0;
  font-family: "Shippori Mincho", serif;
  background: #faf8f5;
  color: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 24px;
  box-sizing: border-box;
}
.not-found {
  max-width: 480px;
}
.not-found h1 {
  font-size: 72px;
  margin: 0 0 8px;
  color: #8a6d4b;
}
.not-found p {
  font-size: 16px;
  line-height: 1.8;
  margin: 0 0 24px;
}
.not-found a {
  display: inline-block;
  padding: 12px 32px;
  background: #8a6d4b;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  font-size: 15px;
}
</style>
</head>
<body>
<div class="not-found">
<h1>404</h1>
<p>お探しのページは見つかりませんでした。<br />URLが変更、または削除された可能性があります。</p>
<a href="/">トップページへ戻る</a>
</div>
</body>
</html>
